[package]
name = "cybersin-cli"
version.workspace = true
edition.workspace = true

[[bin]]
name = "cybersin"
path = "src/main.rs"

[dependencies]
cybersin-frontend = { path = "../cybersin-frontend" }
clap = { version = "4", features = ["derive"] }

[dev-dependencies]
tempfile = "3"
assert_cmd = "2"
predicates = "3"
